<!DOCTYPE html>
<html lang="ko">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 relative">

    <!-- [알림창 UI] 샌드박스 에러 방지용 커스텀 Toast 메시지 컨테이너 -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <!-- 상단 네비게이션 바 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-primary text-white p-2 rounded-lg">
                <i class="fa-solid fa-square-root-variable text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">AutoMathDB</h1>
            <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-2">Admin Pro</span>
        </div>
        <div class="flex items-center space-x-4 text-sm">
            <!-- 현황판 추가 -->
            <div class="hidden md:flex bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200 items-center space-x-3 shadow-sm">
                <span class="text-gray-600 font-medium text-xs"><i class="fa-solid fa-microchip text-indigo-400 mr-1"></i> 모델: <span id="current-ai-model" class="text-primary font-bold">Gemini 2.5 Flash</span></span>
                <span class="text-gray-300">|</span>
                <span class="text-gray-600 font-medium text-xs"><i class="fa-solid fa-database text-green-500 mr-1"></i> DB 누적: <span id="total-db-count" class="text-primary font-bold">로딩중...</span></span>
            </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- 왼쪽 컨트롤 패널 -->
        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            
            <!-- 1. 설정 카드 -->

                <h2 class="text-lg font-semibold mb-4 border-b pb-2"><i class="fa-solid fa-gear text-gray-400 mr-2"></i>기본 설정</h2>

                </button>
            </div>
        </div>

        <!-- 오른쪽 결과 패널 -->
        <div class="w-full lg:w-2/3 bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-lg font-semibold"><i class="fa-solid fa-table-list text-gray-400 mr-2"></i>추출된 문항 데이터 (미리보기)</h2>
                <div class="flex space-x-2">

            <!-- 데이터 테이블 영역 -->

                            <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-48">메타 데이터</th>
                            <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/3">문제 (LaTeX)</th>

                            <td class="px-6 py-4 whitespace-nowrap text-center text-gray-400 italic" colspan="5">
                                <div class="flex flex-col items-center justify-center py-16">
                                    <i class="fa-regular fa-folder-open text-5xl mb-4 text-gray-300"></i>
                                    <p class="text-base font-medium text-gray-500">아직 분석된 데이터가 없습니다.</p>
                                    <p class="text-sm mt-1 text-gray-400">좌측에서 PDF를 업로드하고 변환을 시작해주세요.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

        </div>

    </main>

    <!-- Phase 4: Firebase SDK 연동 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getCountFromServer } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 초기화 ---
        let app, auth, db, appId;
        try {
            // 어떤 환경이든 무조건 원장님의 Firebase 설정만 사용하도록 강제 고정!
            const firebaseConfig = {
                apiKey: "AIzaSyCkznpuvOZAH3W69SxA0SbTFqeP9Z5f15k",
                authDomain: "automathdb.firebaseapp.com",
                projectId: "automathdb",
                storageBucket: "automathdb.firebasestorage.app",
                messagingSenderId: "889365834687",
                appId: "1:889365834687:web:94a8049b068348de5a0f0a"
            };
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = 'automathdb';
        } catch(e) {
            console.warn("Firebase 초기화 중 에러가 발생했습니다.", e);
        }

        // DOM 요소
        const apiKeyInput = document.getElementById('geminiApiKey');
        const fileUpload = document.getElementById('file-upload');
        const dropZone = document.getElementById('drop-zone');
        const fileNameDisplay = document.getElementById('file-name-display');
        const uploadIcon = document.getElementById('upload-icon');
        const btnAnalyze = document.getElementById('btn-analyze');
        const btnText = document.getElementById('btn-text');
        const toastContainer = document.getElementById('toast-container');
        const btnSave = document.getElementById('btn-save');
        const btnExport = document.getElementById('btn-export');
        const tbody = document.querySelector('tbody');

        let selectedFile = null;
        let globalExtractedData = []; // 수정된 데이터를 관리할 전역 변수
        let currentUser = null; // 현재 접속 중인 유저 정보 저장

        // --- 실시간 DB 현황판 업데이트 함수 ---
        async function updateDBCount() {
            const countEl = document.getElementById('total-db-count');
            if (!countEl) return;
            if (!currentUser || !db) {
                countEl.innerText = "로그인 필요";
                return;
            }
            try {
                const collRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'math_problems');
                const snapshot = await getCountFromServer(collRef);
                countEl.innerText = `${snapshot.data().count}개`;
            } catch (error) {
                console.error("DB 카운트 오류:", error);
                if (error.code === 'permission-denied') {
                    countEl.innerText = "권한 없음(규칙)";
                } else {
                    countEl.innerText = "오류 발생";
                }
            }
        }

        // 페이지 로드 시 즉시 익명 로그인 및 현황판 로딩
        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    updateDBCount();
                } else {
                    currentUser = null;
                    const countEl = document.getElementById('total-db-count');
                    if (countEl) countEl.innerText = "연결 중...";
                }
            });

            signInAnonymously(auth).catch((error) => {
                console.error("익명 로그인 에러:", error);
                if (error.code === 'auth/operation-not-allowed') {
                    showToast("Firebase 콘솔에서 '익명 로그인'을 활성화해주세요!", "error");
                }
            });
        }

        // --- 커스텀 알림창(Toast) 함수 ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            let bgColor = 'bg-blue-600';
            let icon = '<i class="fa-solid fa-circle-info"></i>';
            if (type === 'success') {
                bgColor = 'bg-green-600';
                icon = '<i class="fa-solid fa-check-circle"></i>';
            } else if (type === 'error') {
                bgColor = 'bg-red-600';
                icon = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }

            toast.className = `${bgColor} text-white px-4 py-3 rounded shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-0 opacity-100 z-50`;
            toast.innerHTML = `<div class="text-lg">${icon}</div><div class="text-sm font-medium whitespace-pre-line">${message}</div>`;
            
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 8000); // 도메인 복사할 시간이 필요하므로 알림창 표시 시간을 8초로 늘림
        }

        // 1. API 키 로컬 스토리지 저장/불러오기 기능
        const savedApiKey = localStorage.getItem('autoMathApiKey');
        if (savedApiKey) {
            apiKeyInput.value = savedApiKey;
        }
        apiKeyInput.addEventListener('input', (e) => {
            localStorage.setItem('autoMathApiKey', e.target.value);
        });

        // 2. 파일 처리 공통 함수
        function handleFile(file) {
            if (!file) return;
            if (file.type !== 'application/pdf') {
                showToast("지원하지 않는 형식입니다. PDF 파일만 업로드해주세요!", "error");
                return;
            }

            selectedFile = file;
            fileNameDisplay.textContent = `선택됨: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileNameDisplay.classList.remove('text-gray-500');
            fileNameDisplay.classList.add('text-primary', 'font-bold');
            uploadIcon.classList.remove('text-gray-400');
            uploadIcon.classList.add('text-primary');
            dropZone.classList.add('border-primary', 'bg-indigo-50');
            
            btnText.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles mr-2"></i> PDF 분석 및 DB 변환 시작`;
            btnAnalyze.disabled = false;
            btnAnalyze.classList.remove('opacity-75', 'cursor-wait');
            tbody.innerHTML = `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-gray-400 italic" colspan="7">
                        <div class="flex flex-col items-center justify-center py-16">
                            <i class="fa-regular fa-folder-open text-5xl mb-4 text-gray-300"></i>
                            <p class="text-base font-medium text-gray-500">아직 분석된 데이터가 없습니다.</p>
                            <p class="text-sm mt-1 text-gray-400">좌측에서 PDF를 업로드하고 변환을 시작해주세요.</p>
                        </div>
                    </td>
                </tr>`;
            btnSave.disabled = true;
            btnSave.classList.add('opacity-50', 'cursor-not-allowed');
            btnExport.disabled = true;
            btnExport.classList.add('opacity-50', 'cursor-not-allowed');
        }

        // 3. 파일 인풋 선택 및 드래그앤드롭 이벤트
        fileUpload.addEventListener('change', (e) => handleFile(e.target.files[0]));
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary', 'bg-indigo-50');
            uploadIcon.classList.add('animate-bounce');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if(!selectedFile) dropZone.classList.remove('border-primary', 'bg-indigo-50');
            uploadIcon.classList.remove('animate-bounce');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadIcon.classList.remove('animate-bounce');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        // ==========================================
        // Phase 2 핵심 엔진 (PDF 파싱 & AI 호출)
        // ==========================================
        async function extractImagesFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const images = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const base64Data = canvas.toDataURL('image/png').split(',')[1];
                images.push({ mimeType: 'image/png', data: base64Data });
            }
            return images;
        }

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function processWithGemini(images, userApiKey) {
            // 프리뷰 환경에서는 이 앱에 내장된 인증 시스템을 그대로 활용합니다.
            const apiKey = userApiKey || ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const systemInstruction = `당신은 최고 수준의 수학 기출문제 및 교재 분석 AI입니다.
사용자가 제공하는 데이터는 수학 모의고사, 수능 기출, 또는 교재를 캡처한 이미지들입니다.
2단 레이아웃(다단)이거나 문제, 해설, 힌트가 여러 페이지에 뒤섞여 있을 수 있습니다.

다음 지시사항을 엄격하게 따르세요:
1. 눈으로 이미지를 직접 보고, '문항 번호(예: 01, 1 등)'를 기준으로 흩어져 있는 '문제', '정답', '해설'을 정확하게 짝지어주세요.
2. 불필요하고 길어지는 '풀이단계', '접근법' 등은 과감히 버리고 핵심만 추출합니다.
3. 문항 상단이나 주변에 적힌 메타데이터를 반드시 찾아내어 다음 항목으로 분류하세요:
   - internal_id: 문항의 고유 관리 코드 (예: 646191)
   - concept: 단원 및 유형/개념명 (예: 로그의 밑의 변환)
   - difficulty: 난이도 (예: 상, 중, 하)
   - correct_rate: 정답률 (예: 88%, 7% 등)
   - score: 배점 (예: 3점, 4점)
   - source: 출처 (예: 26.03 고3 학력평가 공통 6번)
   - type: 객관식 또는 주관식 여부 (객관식 선지가 있으면 '객관식', 없으면 '주관식')
   - has_image: 문제에 도형, 그래프, 표 등의 그림이 포함되어 있으면 true, 없으면 false
4. 모든 수학 수식과 기호는 반드시 $ 또는 $$ 로 감싼 LaTeX 형식으로 완벽하게 변환하세요.
5. 결과는 반드시 아래의 JSON 배열(Array) 형식으로만 출력하세요.
[
  {
    "id": "문항번호 (예: 01)",
    "internal_id": "고유코드",
    "concept": "단원 및 개념명",
    "difficulty": "난이도",
    "correct_rate": "정답률",
    "score": "배점",
    "source": "출처명",
    "type": "유형",
    "has_image": true,
    "question": "문제 내용 (LaTeX 포함)",
    "answer": "정답 내용",
    "explanation": "해설 내용"
  }
]`;

            const parts = [{ text: "첨부된 수학 교재 이미지들을 분석하여 문항들을 JSON으로 구조화해주세요." }];
            images.forEach(img => parts.push({ inlineData: { mimeType: img.mimeType, data: img.data } }));

            const payload = {
                contents: [{ parts: parts }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { responseMimeType: "application/json", maxOutputTokens: 8192 }
            };

            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!jsonText) throw new Error("AI 응답을 파싱할 수 없습니다.");
            
            let cleanJsonText = jsonText;
            const firstIdx = jsonText.indexOf('[');
            const lastIdx = jsonText.lastIndexOf(']');
            if (firstIdx !== -1 && lastIdx !== -1) cleanJsonText = jsonText.substring(firstIdx, lastIdx + 1);

            try {
                return JSON.parse(cleanJsonText);
            } catch (parseError) {
                throw new Error("AI가 너무 많은 수식을 처리하다가 답변을 중간에 끊었습니다. (출력 길이 한계 초과)\n\n팁: 한 번에 업로드하는 PDF 페이지 수를 줄여보세요!");
            }
        }

        // ==========================================
        // Phase 3 핵심 엔진 (렌더링, 인라인 수정, 암호화)
        // ==========================================
        async function generateHash(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 10);
        }

        async function renderTable(dataArray) {
            tbody.innerHTML = '';
            globalExtractedData = dataArray;

            if (!dataArray || dataArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-400">추출된 데이터가 없습니다.</td></tr>`;
                return;
            }

            for (let i = 0; i < dataArray.length; i++) {
                const item = dataArray[i];
                const hash = await generateHash((item.question || '') + (item.answer || ''));
                item.hash = hash; 

                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/50 transition-colors align-top";
                tr.innerHTML = `
                    <td class="px-3 py-4 text-sm text-gray-700 border-b border-gray-100 bg-gray-50/50">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center"><span class="w-12 text-xs font-semibold text-gray-500">번호</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1" data-idx="${i}" data-key="id">${item.id || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-xs font-semibold text-gray-500">코드</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1 text-xs text-blue-600" data-idx="${i}" data-key="internal_id">${item.internal_id || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-xs font-semibold text-gray-500">유형</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1 text-xs" data-idx="${i}" data-key="type">${item.type || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-xs font-semibold text-gray-500">그림</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1 text-xs ${item.has_image ? 'text-red-500 font-bold' : ''}" data-idx="${i}" data-key="has_image">${item.has_image !== undefined ? item.has_image : ''}</div></div>
                            <div class="text-[10px] text-gray-400 font-normal mt-1 bg-gray-200 rounded px-1 w-fit" title="고유 해시 암호">#${hash}</div>
                        </div>
                    </td>
                    <td class="px-3 py-4 text-sm text-gray-700 border-b border-gray-100 bg-gray-50/50">
                        <div class="flex flex-col gap-2 text-xs">
                            <div class="flex items-center"><span class="w-12 text-gray-500">단원:</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1" data-idx="${i}" data-key="concept">${item.concept || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-gray-500">출처:</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1" data-idx="${i}" data-key="source">${item.source || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-gray-500">난이도:</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1 font-semibold" data-idx="${i}" data-key="difficulty">${item.difficulty || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-gray-500">정답률:</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1 text-purple-600 font-semibold" data-idx="${i}" data-key="correct_rate">${item.correct_rate || ''}</div></div>
                            <div class="flex items-center"><span class="w-12 text-gray-500">배점:</span> <div contenteditable="true" class="flex-1 outline-none bg-white border border-gray-200 focus:border-primary/50 rounded px-1" data-idx="${i}" data-key="score">${item.score || ''}</div></div>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-sm text-gray-700 border-b border-gray-100">
                        <div contenteditable="true" class="outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white rounded p-1.5 hover:bg-gray-100 transition-colors min-h-[5rem] whitespace-pre-wrap break-all" data-idx="${i}" data-key="question">${item.question || ''}</div>
                    </td>
                    <td class="px-4 py-4 text-sm text-gray-700 border-b border-gray-100 font-bold text-red-600">
                        <div contenteditable="true" class="outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white rounded p-1.5 hover:bg-gray-100 transition-colors min-h-[2rem]" data-idx="${i}" data-key="answer">${item.answer || ''}</div>
                    </td>
                    <td class="px-4 py-4 text-sm text-gray-700 border-b border-gray-100">
                        <div contenteditable="true" class="outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white rounded p-1.5 hover:bg-gray-100 transition-colors min-h-[5rem] whitespace-pre-wrap break-all" data-idx="${i}" data-key="explanation">${item.explanation || ''}</div>
                    </td>
                `;
                tbody.appendChild(tr);
            }

            document.querySelectorAll('div[contenteditable="true"]').forEach(cell => {
                cell.addEventListener('input', (e) => {
                    const idx = e.target.getAttribute('data-idx');
                    const key = e.target.getAttribute('data-key');
                    globalExtractedData[idx][key] = e.target.innerText;
                });
            });

            // Phase 4: 버튼 활성화
            btnSave.disabled = false;
            btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
            btnExport.disabled = false;
            btnExport.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        btnAnalyze.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!selectedFile) return showToast("변환할 PDF 파일을 먼저 업로드해주세요!", "error");

            const originalBtnHtml = `<i class="fa-solid fa-wand-magic-sparkles mr-2"></i> PDF 분석 및 DB 변환 시작`;
            btnAnalyze.disabled = true;
            btnAnalyze.classList.add('opacity-75', 'cursor-wait');

            try {
                btnText.innerHTML = `<i class="fa-solid fa-camera-retro fa-bounce mr-2"></i> 1/2단계: PDF를 이미지로 스캔 중...`;
                const images = await extractImagesFromPDF(selectedFile);
                
                btnText.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> 2/2단계: AI 시각 분석 중 (약 10~30초 소요)...`;
                const resultData = await processWithGemini(images, apiKey);
                
                btnText.innerHTML = `<i class="fa-solid fa-table fa-flip mr-2"></i> 3단계: 화면에 그리는 중...`;
                await renderTable(resultData);

                btnText.innerHTML = `<i class="fa-solid fa-check mr-2"></i> 문항 분석 및 묶기 완료!`;
                showToast(`[성공] ${resultData.length}개의 문항을 완벽하게 추출했습니다!`, "success");
            } catch (error) {
                showToast(`처리 중 오류가 발생했습니다:\n${error.message}`, "error");
                btnText.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> 오류 발생. 다시 시도`;
            } finally {
                setTimeout(() => {
                    btnAnalyze.disabled = false;
                    btnAnalyze.classList.remove('opacity-75', 'cursor-wait');
                    if (btnText.innerHTML.includes("오류 발생") || btnText.innerHTML.includes("완료!")) {
                        btnText.innerHTML = originalBtnHtml;
                    }
                }, 2000);
            }
        });

        // ==========================================
        // Phase 4: 클라우드 연동 및 엑셀 내보내기 
        // ==========================================

        // [P4] 1. 클라우드 DB 저장 (Firebase Firestore)
        btnSave.addEventListener('click', async () => {
            if (!db || !auth) {
                showToast("Firebase 환경이 구성되지 않았습니다. 관리자 설정을 확인해주세요.", "error");
                return;
            }

            btnSave.disabled = true;
            btnSave.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> 저장 중...`;

            try {
                // 1) 안전한 통신을 위해 현재 유저 확인 (없으면 익명 로그인)
                let user = auth.currentUser;
                if (!user) {
                    const userCredential = await signInAnonymously(auth);
                    user = userCredential.user;
                }
                
                let successCount = 0;
                
                // 2) 데이터 배열 순회하며 저장 (해시값을 고유 ID로 지정하여 중복 방지)
                for (const item of globalExtractedData) {
                    if(!item.hash) continue;
                    // 문서 참조 경로 생성 (원장님 전용 공간)
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'math_problems', item.hash);
                    
                    // ★ 추가된 핵심 방어 로직: Firestore는 undefined를 절대 허용하지 않으므로 저장 전 깔끔하게 필터링(Sanitize)합니다.
                    const cleanItem = Object.fromEntries(
                        Object.entries(item).filter(([_, v]) => v !== undefined)
                    );

                    // 데이터를 덮어쓰거나 새로 생성 (merge: true 옵션으로 안전성 확보)
                    await setDoc(docRef, cleanItem, { merge: true });
                    successCount++;
                }

                showToast(`[성공] ${successCount}개의 문항이 원장님의 클라우드 데이터베이스에 안전하게 저장되었습니다!`, "success");
                updateDBCount(); // 저장 후 즉시 카운트 갱신
            } catch (error) {
                console.error("Firebase 저장 오류 상세:", error);
                if (error.code === 'permission-denied') {
                    showToast("저장 실패: Firestore '보안 규칙(Rules)'에서 쓰기 권한이 거부되었습니다.", "error");
                } else if (error.code === 'auth/operation-not-allowed') {
                    showToast("저장 실패: Firebase 콘솔에서 '익명 로그인'이 꺼져있습니다.", "error");
                } else if (error.code === 'auth/unauthorized-domain') {
                    showToast("저장 실패: 승인되지 않은 도메인입니다. Firebase 콘솔(Authentication -> 설정)에 현재 주소를 추가해주세요.", "error");
                } else {
                    // ★ 알 수 없는 오류일 경우 원인을 화면에 바로 출력해줍니다.
                    showToast(`저장 실패 (${error.code || '알 수 없음'}):\n${error.message}`, "error");
                }
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i> 클라우드 DB 저장`;
            }
        });

        // [P4] 2. 엑셀(CSV) 내보내기 (브라우저 내장 기능 활용)
        btnExport.addEventListener('click', () => {
            if (!globalExtractedData || globalExtractedData.length === 0) return;

            // 1) CSV 헤더 및 키값 준비
            const headers = ['고유해시(hash)', '문항번호(id)', '고유코드(internal_id)', '유형(type)', '그림여부(has_image)', '출처(source)', '단원(concept)', '난이도(difficulty)', '정답률(correct_rate)', '배점(score)', '문제(question)', '정답(answer)', '해설(explanation)'];
            const keys = ['hash', 'id', 'internal_id', 'type', 'has_image', 'source', 'concept', 'difficulty', 'correct_rate', 'score', 'question', 'answer', 'explanation'];
            
            // 2) 엑셀에서 한글이 깨지지 않도록 BOM(\uFEFF) 삽입
            let csvContent = '\uFEFF' + headers.join(',') + '\n';

            // 3) 본문 데이터 변환
            globalExtractedData.forEach(item => {
                const row = keys.map(key => {
                    let cell = item[key] || '';
                    // 엑셀에서 내용 안의 줄바꿈과 따옴표를 보호하기 위한 이스케이프 처리
                    cell = cell.toString().replace(/"/g, '""'); 
                    return `"${cell}"`; 
                });
                csvContent += row.join(',') + '\n';
            });

            // 4) 가상의 Blob 파일 생성 및 다운로드 강제 실행
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `AutoMathDB_추출결과_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast("엑셀 파일 다운로드가 성공적으로 완료되었습니다!", "success");
        });

    </script>
</body>
